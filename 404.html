<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
        // Redirect any 404 path back to the SPA router
        const path = window.location.pathname;
        const search = window.location.search;
        const hash = window.location.hash;
        const redirectUrl = '/' + (path + search + hash).replace(/^\/+/, '');
        window.location.replace(redirectUrl);
    </script>
</head>
<body>
Redirecting...
</body>
</html>
